# docker-compose.yml for local development
version: "3.8"

services:
  # PostgreSQL Database (optional for production use)
  db:
    image: postgres:16-alpine
    container_name: ase-db
    environment:
      POSTGRES_USER: ase_user
      POSTGRES_PASSWORD: ase_password
      POSTGRES_DB: ase_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ase_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ase-backend
    environment:
      DATABASE_URL: postgresql://ase_user:ase_password@db:5432/ase_db
      INGEST_API_TOKENS: test-token-123
      SEARCH_CACHE_TTL_SECONDS: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ase-frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
